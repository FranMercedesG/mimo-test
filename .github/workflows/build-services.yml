name: Java Docker Pipeline

on:
  workflow_dispatch:
    inputs:
      services:
        description: 'Nombre del servicio'
        required: true
        type: string
      environment:
        description: 'Entorno de despliegue'
        required: true
        default: 'development'
        type: choice
        options:
          - development

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set Environment Directory
        run: |
          if [[ "${{ github.event.inputs.services }}" == "certify" || "${{ github.event.inputs.services }}" == "verify" ]]; then
            echo "TARGET_DIR=${{ github.event.inputs.services }}-service-with-plugins" >> $GITHUB_ENV
          else
            echo "TARGET_DIR=." >> $GITHUB_ENV
          fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B clean package -DskipTests -f "${{ env.TARGET_DIR }}/pom.xml"

      - uses: actions/upload-artifact@v4
        with:
          name: inji-${{ github.event.inputs.services }}-jar
          path: ${{ env.TARGET_DIR }}/target/*.jar

      # - name: Prepare Build Context
      #   run: |
      #     mkdir -p ${{ env.TARGET_DIR }}
      
      #     [ -d config ] && cp -ra config ${{ env.TARGET_DIR }}/
      #     [ -d data ] && cp -ra data ${{ env.TARGET_DIR }}/
      #     [ -d loader_path ] && cp -ra loader_path ${{ env.TARGET_DIR }}/

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: 'access_token'
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.TARGET_DIR }}
          push: true
          tags: |
            us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/inji-${{ github.event.inputs.services }}:latest
            us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/inji-${{ github.event.inputs.services }}:${{ github.sha }}